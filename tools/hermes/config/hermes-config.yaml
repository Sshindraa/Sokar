# Hermes Agent — Configuration Sokar
# Template sans secret. La configuration live est ~/.hermes/config.yaml.
# Copier ce fichier vers ~/.hermes/config.yaml seulement si vous voulez réinitialiser Hermes.

model:
  provider: opencode-go
  model: minimax-m3
  base_url: https://opencode.ai/zen/go/v1
  key_env: OPENCODE_GO_API_KEY
  api_mode: chat_completions
  fallback:
    provider: opencode-go
    model: deepseek-v4-flash
    base_url: https://opencode.ai/zen/go/v1
    key_env: OPENCODE_GO_API_KEY
    api_mode: chat_completions
  default: minimax-m3

delegation:
  model: minimax-m3
  provider: opencode-go
  base_url: https://opencode.ai/zen/go/v1
  key_env: OPENCODE_GO_API_KEY
  api_mode: chat_completions
  orchestrator_enabled: true
  max_iterations: 50
  child_timeout_seconds: 900
  max_concurrent_children: 5
  max_spawn_depth: 2
  subagent_auto_approve: true

# skills_dir: doit pointer sur le repo Sokar (racine), PAS sur tools/hermes/skills.
# Le repo-root charge .devin/skills/orchestrate (orchestration Devin).
# Les scripts tools/hermes/skills/obsidian/ (auto_doc/auto_sync/notion_sync) sont
# invoqués par code via sys.path dans mcp_serve.py — ils ne sont PAS des skills Hermes
# (aucun SKILL.md), donc un skills_dir dessus ne chargerait rien de plus.
# Ne JAMAIS remettre un chemin iCloud (Library/Mobile Documents/...) : il est mort.
skills_dir: '<CHEMIN_VERS_VOTRE_REPO_SOKAR>' # ex: /Users/<vous>/Projects/Sokar — à remplacer après copie
