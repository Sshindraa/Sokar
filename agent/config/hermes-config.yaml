# Hermes Agent — Configuration Callyx
# Architecture 2 niveaux inversée:
# - Primary (executor): deepseek/deepseek-v4-flash (OpenRouter) - fait 90% du travail
# - Subagent (planner): kimi-k2.6-precision (Crof AI) - uniquement pour tâches complexes
# Copier vers ~/.hermes/config.yaml
# NOTE: plus de modèle :free — tout est payant via credits OpenRouter/Crof

model:
  provider: openrouter
  default: deepseek/deepseek-v4-flash
  fallback:
    provider: custom
    model: deepseek-v4-flash
    base_url: https://crof.ai/v1
    api_key: ''
  persistent: true

skills_dir: /Users/hamza/Desktop/Callyx/agent/skills

# Orchestration autonome avec architecture 2 niveaux
# kimi-k2.6-precision pour le planning, deepseek/deepseek-v4-flash pour l'exécution
