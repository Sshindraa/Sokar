<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Widget Mobile Test — Bottom Sheet</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .scrollbar-none::-webkit-scrollbar { display: none; }
    .scrollbar-none { -ms-overflow-style: none; scrollbar-width: none; }
    :root {
      --reservation-bg: 34 32% 92%;
      --reservation-wash: 34 38% 96%;
      --reservation-panel: 0 0% 100%;
      --reservation-ink: 24 10% 10%;
      --reservation-soft: 24 6% 42%;
      --reservation-muted: 24 5% 64%;
      --reservation-line: 28 20% 88%;
      --reservation-blue: 207 92% 52%;
      --reservation-glow: 31 92% 62%;
      --reservation-success: 142 70% 38%;
    }
  </style>
</head>
<body class="m-0 p-0 font-sans antialiased">

  <div class="relative h-screen overflow-hidden"
       style="background: radial-gradient(circle at 50% 20%, hsl(var(--reservation-glow)/0.2), transparent 18rem), linear-gradient(145deg, hsl(var(--reservation-wash)) 0%, hsl(var(--reservation-bg)) 46%, hsl(34 20% 86%) 100%);">

    <div class="pointer-events-none absolute inset-x-0 top-0 h-40 bg-gradient-to-b from-white/60 to-transparent"></div>
    <div class="pointer-events-none absolute left-1/2 top-1/2 h-[34rem] w-[34rem] -translate-x-1/2 -translate-y-1/2 rounded-full bg-[hsl(var(--reservation-glow)/0.11)] blur-3xl"></div>

    <!-- Mobile: dark overlay on top half for contrast -->
    <div class="pointer-events-none absolute inset-x-0 top-0 z-[1] h-[42vh] bg-gradient-to-b from-black/70 via-black/30 to-transparent"></div>

    <!-- Mobile restaurant hero visible above bottom sheet -->
    <div class="absolute inset-x-0 top-0 z-20 flex h-[38vh] flex-col items-center justify-center px-6 text-center">
      <p class="text-[10px] font-bold uppercase tracking-[0.2em] text-white/60">Réserver</p>
      <h1 class="mt-1 text-3xl font-black leading-tight tracking-tight text-white drop-shadow-lg">Test Restaurant</h1>
    </div>

    <main class="relative h-screen overflow-hidden">

      <!-- BOTTOM SHEET -->
      <section class="absolute bottom-0 left-0 right-0 z-10 w-full max-w-none max-h-[52vh] overflow-y-auto rounded-t-[2.15rem] rounded-b-none border border-white/60 bg-white/48 p-4 pb-6 shadow-[0_-8px_40px_rgba(0,0,0,0.12)] backdrop-blur-2xl">

        <!-- Drag handle -->
        <div class="mx-auto mb-3 mt-1 h-1 w-10 shrink-0 rounded-full bg-black/10"></div>
        <div class="pointer-events-none absolute inset-x-8 top-0 h-px bg-gradient-to-r from-transparent via-white/80 to-transparent"></div>

        <!-- CONTENT -->
        <div class="relative z-10 space-y-5">

          <!-- Title Card -->
          <div class="rounded-[1.6rem] border border-white/58 bg-white/34 shadow-sm backdrop-blur-2xl relative overflow-hidden p-4">
            <div class="pointer-events-none absolute -right-10 -top-10 h-28 w-28 rounded-full bg-[hsl(var(--reservation-glow)/0.12)] blur-2xl"></div>
            <p class="text-[10px] font-bold uppercase tracking-[0.2em] text-[hsl(var(--reservation-muted))]">Choisissez votre table</p>
            <div class="mt-3 flex items-end justify-between gap-3">
              <div class="min-w-0">
                <h1 class="truncate text-[2.4rem] font-black leading-[0.85] tracking-normal text-[hsl(var(--reservation-ink))]">Ven</h1>
                <p class="mt-1 truncate text-[2rem] font-black leading-none tracking-normal text-[hsl(var(--reservation-muted))]">5 Jui</p>
              </div>
              <div class="mb-1 shrink-0 rounded-[1.15rem] border border-white/60 bg-white/38 px-3.5 py-2.5 text-right shadow-sm backdrop-blur-2xl">
                <p class="text-xl font-black leading-none text-[hsl(var(--reservation-ink))]">2</p>
                <p class="mt-0.5 text-[10px] font-semibold text-[hsl(var(--reservation-soft))]">pers.</p>
              </div>
            </div>
          </div>

          <!-- Nombre de personnes -->
          <div class="space-y-2">
            <label class="flex items-center gap-1.5 text-[10px] font-bold uppercase tracking-[0.16em] text-[hsl(var(--reservation-muted))]">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
              Nombre de personnes
            </label>
            <div class="scrollbar-none flex gap-2 overflow-x-auto pb-1">
              <button class="h-10 w-10 shrink-0 rounded-full text-sm font-semibold border border-white/60 bg-white/36 text-[hsl(var(--reservation-soft))] shadow-sm backdrop-blur-2xl">1</button>
              <button class="h-10 w-10 shrink-0 rounded-full text-sm font-semibold border border-[hsl(var(--reservation-ink))] bg-[hsl(var(--reservation-ink))] text-[hsl(var(--reservation-panel))] shadow-lg shadow-black/10">2</button>
              <button class="h-10 w-10 shrink-0 rounded-full text-sm font-semibold border border-white/60 bg-white/36 text-[hsl(var(--reservation-soft))] shadow-sm backdrop-blur-2xl">3</button>
              <button class="h-10 w-10 shrink-0 rounded-full text-sm font-semibold border border-white/60 bg-white/36 text-[hsl(var(--reservation-soft))] shadow-sm backdrop-blur-2xl">4</button>
              <button class="h-10 w-10 shrink-0 rounded-full text-sm font-semibold border border-white/60 bg-white/36 text-[hsl(var(--reservation-soft))] shadow-sm backdrop-blur-2xl">5</button>
              <button class="h-10 w-10 shrink-0 rounded-full text-sm font-semibold border border-white/60 bg-white/36 text-[hsl(var(--reservation-soft))] shadow-sm backdrop-blur-2xl">6</button>
              <button class="h-10 w-10 shrink-0 rounded-full text-sm font-semibold border border-white/60 bg-white/36 text-[hsl(var(--reservation-soft))] shadow-sm backdrop-blur-2xl">7</button>
              <button class="h-10 w-10 shrink-0 rounded-full text-sm font-semibold border border-white/60 bg-white/36 text-[hsl(var(--reservation-soft))] shadow-sm backdrop-blur-2xl">8</button>
            </div>
          </div>

          <!-- Dates -->
          <div class="space-y-2">
            <label class="flex items-center gap-1.5 text-[10px] font-bold uppercase tracking-[0.16em] text-[hsl(var(--reservation-muted))]">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>
              Sélectionner la date
            </label>
            <div class="scrollbar-none flex snap-x gap-2 overflow-x-auto pb-1">
              <button class="relative flex h-[4.65rem] min-w-[4.15rem] shrink-0 snap-center flex-col items-center justify-center overflow-hidden rounded-[1.25rem] text-center transition-all duration-200 border-[hsl(var(--reservation-ink))] bg-white/58 text-[hsl(var(--reservation-ink))] shadow-lg shadow-black/10">
                <span class="absolute bottom-2 left-1/2 h-1 w-5 -translate-x-1/2 rounded-full bg-[hsl(var(--reservation-blue))]"></span>
                <span class="text-2xl font-black leading-none tracking-normal">5</span>
                <span class="mt-1 text-[10px] font-bold uppercase tracking-[0.12em] opacity-75">VEN</span>
              </button>
              <button class="relative flex h-[4.65rem] min-w-[4.15rem] shrink-0 snap-center flex-col items-center justify-center overflow-hidden rounded-[1.25rem] text-center transition-all duration-200 border border-white/60 bg-white/36 text-[hsl(var(--reservation-soft))] shadow-sm backdrop-blur-2xl">
                <span class="text-2xl font-black leading-none tracking-normal">6</span>
                <span class="mt-1 text-[10px] font-bold uppercase tracking-[0.12em] opacity-75">SAM</span>
              </button>
              <button class="relative flex h-[4.65rem] min-w-[4.15rem] shrink-0 snap-center flex-col items-center justify-center overflow-hidden rounded-[1.25rem] text-center transition-all duration-200 border border-white/60 bg-white/36 text-[hsl(var(--reservation-soft))] shadow-sm backdrop-blur-2xl">
                <span class="text-2xl font-black leading-none tracking-normal">7</span>
                <span class="mt-1 text-[10px] font-bold uppercase tracking-[0.12em] opacity-75">DIM</span>
              </button>
              <button class="relative flex h-[4.65rem] min-w-[4.15rem] shrink-0 snap-center flex-col items-center justify-center overflow-hidden rounded-[1.25rem] text-center transition-all duration-200 border border-white/60 bg-white/36 text-[hsl(var(--reservation-soft))] shadow-sm backdrop-blur-2xl">
                <span class="text-2xl font-black leading-none tracking-normal">8</span>
                <span class="mt-1 text-[10px] font-bold uppercase tracking-[0.12em] opacity-75">LUN</span>
              </button>
              <button class="relative flex h-[4.65rem] min-w-[4.15rem] shrink-0 snap-center flex-col items-center justify-center overflow-hidden rounded-[1.25rem] text-center transition-all duration-200 border border-white/60 bg-white/36 text-[hsl(var(--reservation-soft))] shadow-sm backdrop-blur-2xl">
                <span class="text-2xl font-black leading-none tracking-normal">9</span>
                <span class="mt-1 text-[10px] font-bold uppercase tracking-[0.12em] opacity-75">MAR</span>
              </button>
            </div>
          </div>

          <!-- Créneau horaire -->
          <div class="space-y-2">
            <label class="flex items-center gap-1.5 text-[10px] font-bold uppercase tracking-[0.16em] text-[hsl(var(--reservation-muted))]">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
              Créneau horaire
            </label>
            <div class="flex items-center gap-3 rounded-2xl border border-white/58 bg-white/34 p-4 text-left shadow-sm backdrop-blur-2xl">
              <div class="flex h-11 w-11 shrink-0 items-center justify-center rounded-full bg-white/42 text-[hsl(var(--reservation-muted))]">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="opacity-50"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
              </div>
              <div>
                <p class="text-sm font-bold text-[hsl(var(--reservation-soft))]">Aucun service ce jour-là</p>
                <p class="mt-0.5 text-xs text-[hsl(var(--reservation-muted))]">Choisissez une autre date.</p>
              </div>
            </div>
          </div>

          <!-- Button -->
          <button class="flex w-full items-center justify-center gap-2 rounded-full py-4 text-sm font-semibold cursor-not-allowed bg-white/42 text-[hsl(var(--reservation-muted))] opacity-80 shadow-none transition-all duration-200">
            Continuer
            <span class="flex h-6 w-6 items-center justify-center rounded-full bg-white/12">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
            </span>
          </button>

          <!-- Footer -->
          <div class="flex items-center justify-center gap-1.5 pt-1">
            <span class="text-[10px] tracking-wide text-[hsl(var(--reservation-muted)/0.72)]">Propulsé par</span>
            <span class="text-[10px] font-bold uppercase tracking-[0.16em] text-[hsl(var(--reservation-muted))]">Sokar</span>
          </div>

        </div>
      </section>

    </main>
  </div>

  <!-- INSTRUCTIONS -->
  <div class="fixed bottom-2 right-2 z-50">
    <div class="rounded-lg bg-black/80 px-3 py-2 text-xs text-white shadow-lg">
      <p class="font-bold">Test mobile</p>
      <p class="text-white/70">Ouvre DevTools → Device Mode → iPhone 14 Pro</p>
    </div>
  </div>

</body>
</html>
