name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same ref (save minutes on rapid pushes)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  # ─────────────────────────────────────────────────────────────
  # Foundation: workspace packages typecheck + test first.
  # (prisma generate runs as part of `build`, which typecheck depends on
  #  via `^build`. tests in packages are stubs for now but the task exists
  #  so turbo's graph is uniform and ready when specs land.)
  # ─────────────────────────────────────────────────────────────
  packages:
    name: Packages (types / config / database)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.8.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm turbo typecheck --filter=@sokar/types --filter=@sokar/config --filter=@sokar/database

      - name: Test
        run: pnpm turbo test --filter=@sokar/types --filter=@sokar/config --filter=@sokar/database

  # ─────────────────────────────────────────────────────────────
  # API: typecheck (turbo-orchestrated, includes workspace deps),
  # unit tests (mocks Prisma/Redis/BullMQ — no real services needed),
  # and a production build.
  # ─────────────────────────────────────────────────────────────
  api:
    name: API
    runs-on: ubuntu-latest
    needs: packages
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.8.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        # turbo walks the dep graph and runs typecheck for api + all
        # workspace deps (prisma generate is triggered via ^build).
        run: pnpm turbo typecheck --filter=@sokar/api...

      - name: Lint
        # Real ESLint (flat config, type-checked rules) — catches floating
        # promises, unused vars, and misused promises that tsc misses.
        run: pnpm --filter @sokar/api lint

      - name: Test
        run: pnpm turbo test --filter=@sokar/api...

      - name: Test coverage
        # vitest --coverage with v8 provider. Thresholds in vitest.config.ts
        # (lines: 60, functions: 65, branches: 55, statements: 60) gate the
        # build — a drop in coverage fails CI. Report is uploaded as an
        # artifact for review.
        run: pnpm --filter @sokar/api test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage
          path: apps/api/coverage/
          retention-days: 14

      - name: Build
        run: pnpm --filter @sokar/api build

  # ─────────────────────────────────────────────────────────────
  # Dashboard: real ESLint (next lint), TypeScript via tsc --noEmit,
  # and next build (catches server/client component boundary errors).
  # ─────────────────────────────────────────────────────────────
  dashboard:
    name: Dashboard
    runs-on: ubuntu-latest
    needs: packages
    timeout-minutes: 20
    env:
      NEXT_TELEMETRY_DISABLED: 1
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.8.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm turbo typecheck --filter=@sokar/dashboard...

      - name: Lint
        run: pnpm --filter @sokar/dashboard lint

      - name: Test
        run: pnpm turbo test --filter=@sokar/dashboard...

      - name: Build
        run: pnpm --filter @sokar/dashboard build

  canal-a:
    name: Canal A
    runs-on: ubuntu-latest
    needs: packages
    timeout-minutes: 20
    env:
      NEXT_TELEMETRY_DISABLED: 1
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.8.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm turbo typecheck --filter=@sokar/canal-a...

      - name: Test
        run: pnpm turbo test --filter=@sokar/canal-a...

      - name: Build
        run: pnpm --filter @sokar/canal-a build
