name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same ref (save minutes on rapid pushes)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  # ─────────────────────────────────────────────────────────────
  # Secret scanning: detect committed secrets before they reach prod.
  # Runs first, in parallel with packages — fails fast if a secret is found.
  # ─────────────────────────────────────────────────────────────
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: 'true'
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: 'false'

  # ─────────────────────────────────────────────────────────────
  # Foundation: workspace packages typecheck + test first.
  # (prisma generate runs as part of `build`, which typecheck depends on
  #  via `^build`. tests in packages are stubs for now but the task exists
  #  so turbo's graph is uniform and ready when specs land.)
  # ─────────────────────────────────────────────────────────────
  packages:
    name: Packages (shared / config / database)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # Pas de `version` : pnpm/action-setup@v4 lit automatiquement
        # `packageManager` dans package.json (pnpm@10.33.3). Spécifier une
        # version fixe ici causait un mismatch "Multiple versions of pnpm
        # specified" et fail-fast en CI.

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm turbo typecheck --filter=@sokar/shared --filter=@sokar/config --filter=@sokar/database

      - name: Test
        run: pnpm turbo test --filter=@sokar/shared --filter=@sokar/config --filter=@sokar/database

  # ─────────────────────────────────────────────────────────────
  # API: typecheck (turbo-orchestrated, includes workspace deps),
  # unit tests (mocks Prisma/Redis/BullMQ — no real services needed),
  # and a production build.
  # ─────────────────────────────────────────────────────────────
  api:
    name: API
    runs-on: ubuntu-latest
    needs: packages
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # Pas de `version` : pnpm/action-setup@v4 lit automatiquement
        # `packageManager` dans package.json (pnpm@10.33.3). Spécifier une
        # version fixe ici causait un mismatch "Multiple versions of pnpm
        # specified" et fail-fast en CI.

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        # turbo walks the dep graph and runs typecheck for api + all
        # workspace deps (prisma generate is triggered via ^build).
        run: pnpm turbo typecheck --filter=@sokar/api...

      - name: Lint
        # Real ESLint (flat config, type-checked rules) — catches floating
        # promises, unused vars, and misused promises that tsc misses.
        run: pnpm --filter @sokar/api lint

      - name: Test
        run: pnpm turbo test --filter=@sokar/api...

      - name: Test coverage
        # vitest --coverage with v8 provider. Thresholds in vitest.config.ts
        # (lines: 60, functions: 65, branches: 55, statements: 60) gate the
        # build — a drop in coverage fails CI. Report is uploaded as an
        # artifact for review.
        run: pnpm --filter @sokar/api test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage
          path: apps/api/coverage/
          retention-days: 14

      - name: Build
        run: pnpm --filter @sokar/api build

  # ─────────────────────────────────────────────────────────────
  # Dashboard: real ESLint (next lint), TypeScript via tsc --noEmit,
  # and next build (catches server/client component boundary errors).
  # ─────────────────────────────────────────────────────────────
  dashboard:
    name: Dashboard
    runs-on: ubuntu-latest
    needs: packages
    timeout-minutes: 20
    env:
      NEXT_TELEMETRY_DISABLED: 1
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # Pas de `version` : pnpm/action-setup@v4 lit automatiquement
        # `packageManager` dans package.json (pnpm@10.33.3). Spécifier une
        # version fixe ici causait un mismatch "Multiple versions of pnpm
        # specified" et fail-fast en CI.

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm turbo typecheck --filter=@sokar/dashboard...

      - name: Lint
        run: pnpm --filter @sokar/dashboard lint

      - name: CSS lint (stylelint)
        # Garde-fou CSS : interdit les sélecteurs d'éléments bruts (header, main,
        # section…), les couleurs hex, !important et les z-index arbitraires.
        # Prévient l'incident `header { position: fixed }` de juillet 2026.
        run: pnpm lint:css

      - name: Test
        run: pnpm turbo test --filter=@sokar/dashboard...

      - name: Build
        run: pnpm --filter @sokar/dashboard build

      - name: Install Playwright browsers
        run: pnpm --filter @sokar/dashboard exec playwright install --with-deps chromium

      - name: E2E tests (dashboard)
        # Garde-fou non-régression : vérifie que /dashboard se charge sans erreur
        # sur 3 viewports, que le header analytics ne chevauche pas les widgets,
        # et que les KPIs/graphiques s'affichent.
        run: pnpm test:e2e

      # ─────────────────────────────────────────────────────────────
      # RÉGRESSION VISUELLE — DÉSACTIVÉE EN CI (juillet 2026)
      #
      # Les baselines sont générés sur macOS (suffixe -darwin). En CI (Linux),
      # le rendu diffère de 1-2 % (fonts / anti-aliasing), bien au-delà du seuil
      # de 0.2 %. La copie -darwin → -linux ne suffit pas.
      #
      # Les tests visuels restent disponibles en local via `pnpm test:visual`
      # et fonctionnent correctement sur macOS.
      #
      # TODO (follow-up) : générer des baselines Linux dédiés via un workflow
      # CI qui capture et commit les baselines, ou utiliser un seuil adapté
      # par plateforme. Voir PR #2 discussion.
      # ─────────────────────────────────────────────────────────────
      - name: Préparer les baselines visuels pour Linux
        if: false
        run: |
          cd apps/dashboard/e2e/__snapshots__/visual-regression.spec.ts-snapshots/
          for f in *-darwin.png; do
            linux="${f%-darwin.png}-linux.png"
            cp "$f" "$linux"
          done

      - name: Visual regression tests (dashboard)
        if: false
        run: pnpm test:visual

      - name: Upload visual diff artifacts
        if: false
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-diffs
          path: |
            apps/dashboard/test-results/
            apps/dashboard/playwright-report/
          retention-days: 14

  connect:
    name: Sokar Connect
    runs-on: ubuntu-latest
    needs: packages
    timeout-minutes: 20
    env:
      NEXT_TELEMETRY_DISABLED: 1
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # Pas de `version` : pnpm/action-setup@v4 lit automatiquement
        # `packageManager` dans package.json (pnpm@10.33.3). Spécifier une
        # version fixe ici causait un mismatch "Multiple versions of pnpm
        # specified" et fail-fast en CI.

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm turbo typecheck --filter=@sokar/connect...

      - name: Lint
        run: pnpm --filter @sokar/connect lint

      - name: Test
        run: pnpm turbo test --filter=@sokar/connect...

      - name: Build
        run: pnpm --filter @sokar/connect build
