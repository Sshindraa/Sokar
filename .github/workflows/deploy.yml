name: Deploy Sokar to VPS

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Production VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.VPS_PORT || '22' }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_PRD }}
        run: |
          ssh -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" << 'EOF'
            set -e
            cd /opt/sokar
            echo "🚀 Pulling latest changes..."
            git pull origin main

            echo "📦 Installing dependencies..."
            pnpm install --frozen-lockfile

            echo "🗄️ Generating Prisma client..."
            pnpm --filter @sokar/database generate

            echo "🔨 Building..."
            pnpm build

            echo "📦 Copying static assets..."
            cp -r apps/dashboard/public apps/dashboard/.next/standalone/apps/dashboard/ 2>/dev/null || true
            mkdir -p apps/dashboard/.next/standalone/apps/dashboard/.next 2>/dev/null || true
            cp -r apps/dashboard/.next/static apps/dashboard/.next/standalone/apps/dashboard/.next/ 2>/dev/null || true
            cp -r apps/dashboard/public apps/dashboard/.next/standalone/ 2>/dev/null || true
            mkdir -p apps/dashboard/.next/standalone/.next 2>/dev/null || true
            cp -r apps/dashboard/.next/static apps/dashboard/.next/standalone/.next/ 2>/dev/null || true

            echo "🗄️ Running migrations..."
            pnpm --filter @sokar/database prisma migrate deploy

            echo "🔑 Configuring Doppler..."
            doppler configure set token "$DOPPLER_TOKEN" --scope /opt/sokar 2>/dev/null || true

            echo "🔄 Restarting services..."
            sudo pm2 restart sokar-api --update-env
            sudo pm2 restart sokar-dashboard --update-env

            echo "✅ Deployment complete!"
          EOF

      - name: Health check
        run: |
          echo "Checking sokar.tech health..."
          curl -sf https://sokar.tech/health || curl -sf https://sokar.tech || true
          echo "Checking api.sokar.tech health..."
          curl -sf https://api.sokar.tech/health || true
