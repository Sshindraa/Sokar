# ── Sokar Infra Stack ───────────────────────────────────────────────────────
# PostgreSQL + Redis via Docker
# API et Dashboard tournent directement via PM2 (build natif sur le VPS)

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sokar
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?err}
      POSTGRES_DB: sokar
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sokar']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '127.0.0.1:6379:6379'
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  localstack:
    image: localstack/localstack:4.2
    ports:
      - '127.0.0.1:4566:4566'
    environment:
      - SERVICES=s3,sqs,ses,lambda,cloudwatch,secretsmanager
      - AWS_DEFAULT_REGION=eu-west-1
      - DEBUG=${LOCALSTACK_DEBUG:-0}
      - LOCALSTACK_AUTH_TOKEN=${LOCALSTACK_AUTH_TOKEN:-}
    volumes:
      - localstack-data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:4566/_localstack/health']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redis-data:
  localstack-data:
