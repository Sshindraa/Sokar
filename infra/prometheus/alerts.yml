# ── Sokar Prometheus alerting rules ──────────────────────────────────────────
# Architecture d'alerting ACTIVE (pilote) :
#
#   1. Worker in-app `system-health` (toutes les 5 min, même process que l'API)
#      — apps/api/src/shared/queue/workers/system-health.worker.ts
#      Évalue : files BullMQ inaccessibles, jobs failed / dead-letter / backlog,
#      appels sans transcription ou sans outcome (24h), réservations sans SMS
#      de confirmation (24h). Dispatch : logs + Sentry + email (ALERT_EMAIL_TO)
#      + webhook (ALERT_WEBHOOK_URL) + SMS critique (ALERT_SMS_TO).
#
#   2. Worker in-app `alert-evaluation` (toutes les 5 min)
#      — apps/api/src/shared/queue/workers/alert-evaluation.worker.ts
#      Évalue : taux 5xx global, 5xx Connect, latence p95 Connect, backlog
#      connect-analytics. Sortie : logs + Sentry.
#
#   3. Watchdog VPS (cron toutes les 5 min)
#      — scripts/ops/sokar-watchdog.sh (/usr/local/sbin/sokar-watchdog)
#      Évalue : API/dashboard/connect injoignables, Redis/Postgres arrêtés,
#      backup quotidien absent (>26h), disque/mémoire critiques.
#      Notification : ALERT_WEBHOOK / ALERT_CMD + heartbeat externe
#      (HEALTHCHECKS_PING_URL) qui couvre la panne totale du VPS.
#
# Les règles Prometheus ci-dessous REFLÈTENT les seuils actifs in-app : elles
# deviennent effectives dès qu'un Prometheus scrape /metrics (les gauges
# sokar_queue_jobs, sokar_calls_missing_transcript_24h et
# sokar_reservations_missing_confirmation_sms_24h sont publiées à chaque tick
# du worker system-health). Elles servent aussi de documentation des seuils.
#
# Chargement : ajouter dans prometheus.yml :
#   rule_files:
#     - /etc/prometheus/alerts.yml
#
# Cf. docs/pilot/grafana-dashboard-connect.json pour les panels associés.

groups:
  # ── Alertes pilote (miroir des checks in-app actifs) ──────────────────────
  - name: sokar-pilot-ops
    interval: 5m
    rules:
      # Webhook Telnyx en erreur : signature rejetée ou handler 5xx.
      # Miroir du check in-app sur sokar_telnyx_webhook_events_total.
      - alert: TelnyxWebhookErrors
        expr: increase(sokar_telnyx_webhook_events_total{result=~"error|rejected"}[15m]) > 5
        for: 5m
        labels:
          severity: critical
          team: sokar
        annotations:
          summary: 'Webhooks Telnyx en erreur ({{ $value }} en 15 min)'
          description: "Plus de 5 webhooks Telnyx rejetés (signature) ou en erreur 5xx sur 15 min. Les appels entrants ne sont peut-être plus traités. Vérifier les logs API (grep 'telnyx-guard' et 'voice/telnyx') et la file telnyx-webhooks."

      # Jobs en échec : une file dépasse le seuil in-app (5 failed).
      - alert: QueueFailedJobs
        expr: sokar_queue_jobs{state="failed",queue!="dead-letter"} >= 5
        for: 10m
        labels:
          severity: critical
          team: sokar
        annotations:
          summary: 'File « {{ $labels.queue }} » : {{ $value }} jobs en échec'
          description: "La file BullMQ {{ $labels.queue }} cumule les jobs failed. Vérifier les logs API (grep 'job failed') et la dead-letter."

      # Dead-letter non vide : jobs définitivement perdus sans replay auto.
      - alert: DeadLetterBacklog
        expr: sokar_queue_jobs{queue="dead-letter",state="waiting"} > 0
        for: 5m
        labels:
          severity: critical
          team: sokar
        annotations:
          summary: '{{ $value }} job(s) en dead-letter'
          description: 'Des jobs ont épuisé toutes leurs tentatives et ne seront jamais rejoués automatiquement. Investigation manuelle requise.'

      # Backlog : la file n'absorbe plus le travail (worker arrêté ou lent).
      - alert: QueueBacklog
        expr: sokar_queue_jobs{state="waiting",queue!="dead-letter"} >= 100
        for: 10m
        labels:
          severity: warning
          team: sokar
        annotations:
          summary: 'Backlog de {{ $value }} jobs dans « {{ $labels.queue }} »'
          description: 'La file {{ $labels.queue }} accumule : worker arrêté, Redis lent ou pic de trafic.'

      # Appels sans transcription / sans réponse (gauche du check in-app 24h).
      - alert: CallsMissingTranscript
        expr: sokar_calls_missing_transcript_24h > 0
        for: 15m
        labels:
          severity: warning
          team: sokar
        annotations:
          summary: '{{ $value }} appel(s) sans transcription ou sans outcome sur 24h'
          description: 'Pipeline voix potentiellement cassé (Deepgram STT, stream WebSocket, webhook /voice/telnyx/end). Vérifier les logs API et passer un appel test.'

      # Réservations créées sans SMS de confirmation tracé.
      - alert: ReservationsMissingConfirmationSms
        expr: sokar_reservations_missing_confirmation_sms_24h > 0
        for: 15m
        labels:
          severity: warning
          team: sokar
        annotations:
          summary: '{{ $value }} réservation(s) sans SMS de confirmation sur 24h'
          description: "Des réservations avec téléphone client n'ont pas de trace d'envoi du SMS de confirmation. Vérifier la file sms-client, les logs outbound-confirm et le solde Telnyx."

      # Canal d'alerte cassé : des erreurs d'envoi s'accumulent.
      - alert: AlertDeliveryFailing
        expr: increase(sokar_alerts_sent_total{result="error"}[1h]) > 0
        for: 5m
        labels:
          severity: warning
          team: sokar
        annotations:
          summary: "Échec d'envoi d'alerte sur le canal {{ $labels.channel }}"
          description: "Le dispatcher d'alertes n'arrive plus à envoyer sur {{ $labels.channel }}. Vérifier ALERT_EMAIL_TO / ALERT_WEBHOOK_URL / ALERT_SMS_TO et les logs API."

  # ── Observabilité Connect + MCP (Phase 1) ────────────────────────────────
  - name: sokar-connect-observability
    interval: 5m
    rules:
      # MCP : si aucun tool MCP n'est appelé pendant 72h après déploiement,
      # c'est que le serveur MCP n'est pas découvert/utilisé par les clients.
      - alert: McpToolCallsStale
        expr: increase(sokar_mcp_tool_calls_total[72h]) == 0
        for: 72h
        labels:
          severity: warning
          team: sokar
        annotations:
          summary: 'Aucun appel MCP tool depuis 72h'
          description: "sokar_mcp_tool_calls_total n'a pas augmenté pendant 72h. Le serveur MCP n'est peut-être pas découvert par les clients MCP (Claude Desktop, Cursor), ou l'auth/API key n'est pas configurée."

      # IA crawl : si aucun bot IA ne crawl les pages publiques pendant 72h,
      # c'est que le crawl IA ne se produit pas (robots.txt bloquant, DNS, ou
      # les bots n'ont pas encore découvert le site).
      - alert: IaBotHitsStale
        expr: increase(sokar_connect_ia_bot_hits_total[72h]) == 0
        for: 72h
        labels:
          severity: warning
          team: sokar
        annotations:
          summary: 'Aucun hit bot IA depuis 72h'
          description: "sokar_connect_ia_bot_hits_total n'a pas augmenté pendant 72h. Les bots IA (GPTBot, ClaudeBot, OAI-SearchBot...) ne crawlent pas Sokar. Vérifier robots.txt, le sitemap, et que les pages sont indexables."

      # MCP error rate : si >10% des appels MCP sont en erreur sur 1h.
      - alert: McpToolErrorRateHigh
        expr: |
          sum(rate(sokar_mcp_tool_calls_total{status="error"}[1h]))
          /
          clamp_min(sum(rate(sokar_mcp_tool_calls_total[1h])), 0.001)
          > 0.10
        for: 1h
        labels:
          severity: critical
          team: sokar
        annotations:
          summary: "Taux d'erreur MCP > 10% sur 1h"
          description: "Plus de 10% des appels MCP tool échouent. Vérifier les logs API et l'état des services dépendants (DB, Redis, Telnyx)."

      # Fail-open Redis/cache : si une source donnée fail-open plus de 10 fois
      # en 5 minutes, c'est qu'un service Redis/cache est down prolongé (pas un
      # simple hoquet). Déclenche une alerte critique pour investigation.
      # Seuil de 10/5min = évite le bruit d'un hoquet isolé, détecte un down
      # réel (Redis down → chaque requête rate-limit/cache fail-open).
      - alert: FailOpenBurst
        expr: increase(sokar_fail_open_total[5m]) > 10
        for: 5m
        labels:
          severity: critical
          team: sokar
        annotations:
          summary: 'Fail-open Redis/cache en rafale ({{ $value }} en 5min)'
          description: "sokar_fail_open_total a augmenté de plus de 10 sur 5 minutes. Un service Redis/cache (rate limiter MCP, connect rate limit, cache OpenAI Reserve, idempotency) est probablement down. Vérifier l'état Redis et les logs API (grep 'fail_open')."
