# Sokar STAGING reverse proxy.
#
# Miroir de sokar.conf (prod) mais sur les ports staging :
#   API      → 127.0.0.1:4100
#   Dashboard → 127.0.0.1:3100
#   Connect  → 127.0.0.1:4102
#
# Domaines :
#   staging.sokar.tech     → dashboard (avec /api/ → API, /restaurant/ → connect)
#   api-staging.sokar.tech → API directe (WebSockets inclus)
#
# TLS : utilise un certificat dédié staging (chemin Let's Encrypt par défaut).
# Le certificat doit couvrir staging.sokar.tech et api-staging.sokar.tech.
# Certbot : certbot certonly --nginx -d staging.sokar.tech -d api-staging.sokar.tech

map $http_upgrade $connection_upgrade_staging {
    default upgrade;
    ''      close;
}

# Rate limits nginx (protection avant l'API Fastify).
# Zones staging distinctes de prod pour éviter les conflits de nom.
limit_req_zone $binary_remote_addr zone=connect_hold_staging:10m rate=12r/m;
limit_req_zone $binary_remote_addr zone=connect_confirm_staging:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=connect_public_staging:10m rate=120r/m;

upstream sokar_staging_dashboard {
    server 127.0.0.1:3100;
    keepalive 16;
}

upstream sokar_staging_api {
    server 127.0.0.1:4100;
    keepalive 16;
}

upstream sokar_staging_connect {
    server 127.0.0.1:4102;
    keepalive 8;
}

# ── staging.sokar.tech : dashboard + API + connect ───────
server {
    listen 80;
    listen [::]:80;
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name staging.sokar.tech;

    ssl_certificate /etc/letsencrypt/live/staging.sokar.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging.sokar.tech/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Robots-Tag "noindex, nofollow" always;

    # Next.js route handlers (proxy dashboard).
    location ^~ /api/proxy/ {
        proxy_pass http://sokar_staging_dashboard;
        include /etc/nginx/snippets/sokar-proxy.conf;
    }

    location = /api/auth/sync {
        proxy_pass http://sokar_staging_dashboard;
        include /etc/nginx/snippets/sokar-proxy.conf;
    }

    # Fastify endpoints.
    location ^~ /api/ {
        proxy_pass http://sokar_staging_api;
        include /etc/nginx/snippets/sokar-proxy.conf;
    }

    # Sokar Connect pages.
    location ^~ /restaurant/ {
        proxy_pass http://sokar_staging_connect;
        include /etc/nginx/snippets/sokar-proxy.conf;
        proxy_read_timeout 30s;
    }

    location ^~ /restaurants/ {
        proxy_pass http://sokar_staging_connect;
        include /etc/nginx/snippets/sokar-proxy.conf;
        proxy_read_timeout 30s;
    }

    location = /sitemap.xml {
        proxy_pass http://sokar_staging_connect;
        include /etc/nginx/snippets/sokar-proxy.conf;
    }

    location = /robots.txt {
        proxy_pass http://sokar_staging_connect;
        include /etc/nginx/snippets/sokar-proxy.conf;
    }

    location ^~ /connect-assets/ {
        proxy_pass http://sokar_staging_connect;
        include /etc/nginx/snippets/sokar-proxy.conf;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # Widget pages (iframe-embeddable).
    location ~ ^/widget/[^/]+/gift-card$ {
        proxy_pass http://sokar_staging_connect;
        include /etc/nginx/snippets/sokar-proxy.conf;
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
        proxy_hide_header Cache-Control;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://js.stripe.com; style-src 'self' 'unsafe-inline'; img-src 'self' https: data:; font-src 'self' data:; connect-src 'self' https://api.stripe.com; frame-src https://js.stripe.com https://hooks.stripe.com; frame-ancestors *; base-uri 'self'; form-action 'self' https://hooks.stripe.com" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
        proxy_read_timeout 30s;
    }

    location ~ ^/widget/[^/]+$ {
        proxy_pass http://sokar_staging_dashboard;
        include /etc/nginx/snippets/sokar-proxy.conf;
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
        proxy_hide_header Cache-Control;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' https: data:; font-src 'self' data:; connect-src 'self'; frame-ancestors *; base-uri 'self'; form-action 'self'" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
        proxy_read_timeout 30s;
    }

    location ~ ^/book/[^/]+$ {
        proxy_pass http://sokar_staging_dashboard;
        include /etc/nginx/snippets/sokar-proxy.conf;
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
        proxy_hide_header Cache-Control;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' https: data:; font-src 'self' data:; connect-src 'self'; frame-ancestors *; base-uri 'self'; form-action 'self'" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
        proxy_read_timeout 30s;
    }

    location ^~ /_next/static/ {
        proxy_pass http://sokar_staging_dashboard;
        include /etc/nginx/snippets/sokar-proxy.conf;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location / {
        proxy_pass http://sokar_staging_dashboard;
        include /etc/nginx/snippets/sokar-proxy.conf;
        add_header X-Frame-Options "SAMEORIGIN" always;
    }
}

# ── api-staging.sokar.tech : API directe ─────────────────
server {
    listen 80;
    listen [::]:80;
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api-staging.sokar.tech;

    ssl_certificate /etc/letsencrypt/live/staging.sokar.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging.sokar.tech/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Robots-Tag "noindex, nofollow" always;

    # Rate limits nginx sur les routes Connect sensibles (protection avant Fastify).
    location ~ ^/public/r/[^/]+/hold$ {
        proxy_pass http://sokar_staging_api;
        include /etc/nginx/snippets/sokar-proxy.conf;
        limit_req zone=connect_hold_staging burst=5 nodelay;
    }

    location ~ ^/public/r/[^/]+/confirm$ {
        proxy_pass http://sokar_staging_api;
        include /etc/nginx/snippets/sokar-proxy.conf;
        limit_req zone=connect_confirm_staging burst=3 nodelay;
    }

    location ~ ^/public/ {
        proxy_pass http://sokar_staging_api;
        include /etc/nginx/snippets/sokar-proxy.conf;
        limit_req zone=connect_public_staging burst=20 nodelay;
    }

    location / {
        proxy_pass http://sokar_staging_api;
        include /etc/nginx/snippets/sokar-proxy.conf;

        # Telnyx media streams (long-lived WebSocket).
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
