# Sokar production reverse proxy.
#
# Nginx is the canonical edge proxy. Port 443 supports Cloudflare Full Strict.
# Port 80 remains available to Cloudflare during the SSL-mode transition and
# for ACME renewal; the firewall blocks direct non-Cloudflare origin traffic.
#
# Routing contract:
#   sokar.tech
#     /api/proxy/*, /api/auth/sync  -> dashboard :3000 (Next route handlers)
#     /api/*                        -> API :4000
#     /r/*, /restaurants/*,
#     /sitemap.xml, /robots.txt     -> Sokar Connect :4002
#     /widget/*                     -> dashboard :3000 (iframe-enabled)
#     everything else               -> dashboard :3000
#   api.sokar.tech
#     everything                    -> API :4000 (including WebSockets)

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream sokar_dashboard {
    server 127.0.0.1:3000;
    keepalive 16;
}

upstream sokar_api {
    server 127.0.0.1:4000;
    keepalive 16;
}

upstream sokar_connect {
    server 127.0.0.1:4002;
    keepalive 8;
}

# Cloudflare publishes this list at https://www.cloudflare.com/ips/.
# Keep it in one include so both virtual hosts use the same trust boundary.
include /etc/nginx/snippets/sokar-cloudflare-real-ip.conf;

server {
    listen 80;
    listen [::]:80;
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sokar.tech www.sokar.tech;

    ssl_certificate /etc/letsencrypt/live/sokar.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sokar.tech/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;

    # Next.js route handlers. These MUST be evaluated before /api/, otherwise
    # Fastify receives a non-existent /api/proxy/... route.
    location ^~ /api/proxy/ {
        proxy_pass http://sokar_dashboard;
        include /etc/nginx/snippets/sokar-proxy.conf;
    }

    location = /api/auth/sync {
        proxy_pass http://sokar_dashboard;
        include /etc/nginx/snippets/sokar-proxy.conf;
    }

    # Fastify endpoints intentionally exposed on the primary domain.
    location ^~ /api/ {
        proxy_pass http://sokar_api;
        include /etc/nginx/snippets/sokar-proxy.conf;
    }

    # Public SEO/agent-ready application.
    location ^~ /r/ {
        proxy_pass http://sokar_connect;
        include /etc/nginx/snippets/sokar-proxy.conf;
    }

    location ^~ /restaurants/ {
        proxy_pass http://sokar_connect;
        include /etc/nginx/snippets/sokar-proxy.conf;
    }

    location = /sitemap.xml {
        proxy_pass http://sokar_connect;
        include /etc/nginx/snippets/sokar-proxy.conf;
    }

    location = /robots.txt {
        proxy_pass http://sokar_connect;
        include /etc/nginx/snippets/sokar-proxy.conf;
    }

    # assetPrefix used by apps/connect. Do not strip the prefix: the Next
    # standalone server is built with the same public asset prefix.
    location ^~ /connect-assets/ {
        proxy_pass http://sokar_connect;
        include /etc/nginx/snippets/sokar-proxy.conf;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # Embeddable widget. Remove clickjacking headers emitted by the dashboard
    # and replace them with an explicit iframe policy for third-party sites.
    location ^~ /widget/ {
        proxy_pass http://sokar_dashboard;
        include /etc/nginx/snippets/sokar-proxy.conf;
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
        proxy_hide_header Cache-Control;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' https: data:; font-src 'self' data:; connect-src 'self'; frame-ancestors *; base-uri 'self'; form-action 'self'" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location ^~ /_next/static/ {
        proxy_pass http://sokar_dashboard;
        include /etc/nginx/snippets/sokar-proxy.conf;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location / {
        proxy_pass http://sokar_dashboard;
        include /etc/nginx/snippets/sokar-proxy.conf;
        add_header X-Frame-Options "SAMEORIGIN" always;
    }
}

server {
    listen 80;
    listen [::]:80;
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.sokar.tech;

    ssl_certificate /etc/letsencrypt/live/sokar.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sokar.tech/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        proxy_pass http://sokar_api;
        include /etc/nginx/snippets/sokar-proxy.conf;

        # Telnyx media streams are long-lived WebSocket connections.
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
