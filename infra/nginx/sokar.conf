# Sokar production reverse proxy.
#
# Nginx is the canonical edge proxy. Port 443 supports Cloudflare Full Strict.
# Port 80 remains available to Cloudflare during the SSL-mode transition and
# for ACME renewal; the firewall blocks direct non-Cloudflare origin traffic.
#
# Routing contract:
#   sokar.tech
#     /api/proxy/*, /api/auth/sync  -> dashboard :3000 (Next route handlers)
#     /api/*                        -> API :4000
#     /restaurant/*, /restaurants/*,
#     /widget/[slug]/gift-card,
#     /sitemap.xml, /robots.txt     -> Sokar Connect :4002
#     /widget/[slug]                -> dashboard :3000 (widget réservation avancé)
#     everything else               -> dashboard :3000
#   api.sokar.tech
#     everything                    -> API :4000 (including WebSockets)

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Rate limits nginx (protection avant l'API Fastify).
# Les routes /hold et /confirm sont les plus sensibles (écriture DB + Redis).
# burst permet les pics légitimes (double-click mitigé côté client).
limit_req_zone $binary_remote_addr zone=connect_hold:10m rate=12r/m;
limit_req_zone $binary_remote_addr zone=connect_confirm:10m rate=10r/m;
# Rate limit global pour les routes publiques Connect (availability, slug, etc.)
limit_req_zone $binary_remote_addr zone=connect_public:10m rate=120r/m;

# Cache origine pour les pages SSR Connect (fallback si Cloudflare bypassé).
# TTL court (60s) aligné sur l'ISR Next.js. Les requêtes auth/POST ne sont pas cachées.
proxy_cache_path /var/cache/nginx/connect
    levels=1:2
    keys_zone=connect_cache:10m
    max_size=100m
    inactive=10m
    use_temp_path=off;

upstream sokar_dashboard {
    server 127.0.0.1:3000;
    keepalive 16;
}

upstream sokar_api {
    server 127.0.0.1:4000;
    keepalive 16;
}

upstream sokar_connect {
    server 127.0.0.1:4002;
    keepalive 8;
}

# Cloudflare publishes this list at https://www.cloudflare.com/ips/.
# Keep it in one include so both virtual hosts use the same trust boundary.
include /etc/nginx/snippets/sokar-cloudflare-real-ip.conf;

server {
    listen 80;
    listen [::]:80;
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sokar.tech www.sokar.tech;

    ssl_certificate /etc/letsencrypt/live/sokar.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sokar.tech/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Next.js route handlers. These MUST be evaluated before /api/, otherwise
    # Fastify receives a non-existent /api/proxy/... route.
    location ^~ /api/proxy/ {
        proxy_pass http://sokar_dashboard;
        include /etc/nginx/snippets/sokar-proxy.conf;
    }

    location = /api/auth/sync {
        proxy_pass http://sokar_dashboard;
        include /etc/nginx/snippets/sokar-proxy.conf;
    }

    # Fastify endpoints intentionally exposed on the primary domain.
    location ^~ /api/ {
        proxy_pass http://sokar_api;
        include /etc/nginx/snippets/sokar-proxy.conf;
    }

    # Public SEO/agent-ready application.
    # Cache origine (fallback si Cloudflare bypassé). TTL 60s aligné sur ISR Next.js.
    # Seules les requêtes GET sans query params de preview sont cachées.
    location ^~ /restaurant/ {
        proxy_pass http://sokar_connect;
        include /etc/nginx/snippets/sokar-proxy.conf;
        proxy_cache connect_cache;
        proxy_cache_valid 200 60s;
        proxy_cache_valid 404 10s;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        proxy_cache_bypass $http_upgrade $arg_preview;
        proxy_no_cache $http_upgrade $arg_preview;
        add_header X-Cache-Status $upstream_cache_status always;
        # SSR Next.js peut prendre plus de temps que le default 5s
        proxy_read_timeout 30s;
    }

    location ^~ /restaurants/ {
        proxy_pass http://sokar_connect;
        include /etc/nginx/snippets/sokar-proxy.conf;
        proxy_cache connect_cache;
        proxy_cache_valid 200 60s;
        proxy_cache_valid 404 10s;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        proxy_cache_bypass $http_upgrade $arg_preview;
        proxy_no_cache $http_upgrade $arg_preview;
        add_header X-Cache-Status $upstream_cache_status always;
        proxy_read_timeout 30s;
    }

    location = /sitemap.xml {
        proxy_pass http://sokar_connect;
        include /etc/nginx/snippets/sokar-proxy.conf;
    }

    location = /robots.txt {
        proxy_pass http://sokar_connect;
        include /etc/nginx/snippets/sokar-proxy.conf;
    }

    # IA discovery endpoints (llms.txt, ai-plugin.json, /assistant)
    location = /llms.txt {
        proxy_pass http://sokar_connect;
        include /etc/nginx/snippets/sokar-proxy.conf;
    }

    location ^~ /.well-known/ {
        proxy_pass http://sokar_connect;
        include /etc/nginx/snippets/sokar-proxy.conf;
    }

    location = /assistant {
        proxy_pass http://sokar_connect;
        include /etc/nginx/snippets/sokar-proxy.conf;
    }

    location = /privacy {
        proxy_pass http://sokar_connect;
        include /etc/nginx/snippets/sokar-proxy.conf;
    }

    # assetPrefix used by apps/connect. Do not strip the prefix: the Next
    # standalone server is built with the same public asset prefix.
    location ^~ /connect-assets/ {
        proxy_pass http://sokar_connect;
        include /etc/nginx/snippets/sokar-proxy.conf;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # Embeddable widget.
    # - /widget/[slug]/gift-card → Sokar Connect (achat carte cadeau).
    # - /widget/[slug]           → Dashboard (widget de réservation avancé, UI mobile-first).
    # Les deux sont conçus pour être embarqués en iframe : on force frame-ancestors *.
    location ~ ^/widget/[^/]+/gift-card$ {
        proxy_pass http://sokar_connect;
        include /etc/nginx/snippets/sokar-proxy.conf;
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
        proxy_hide_header Cache-Control;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://js.stripe.com; style-src 'self' 'unsafe-inline'; img-src 'self' https: data:; font-src 'self' data:; connect-src 'self' https://api.stripe.com; frame-src https://js.stripe.com https://hooks.stripe.com; frame-ancestors *; base-uri 'self'; form-action 'self' https://hooks.stripe.com" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
        proxy_read_timeout 30s;
    }

    location ~ ^/widget/[^/]+$ {
        proxy_pass http://sokar_dashboard;
        include /etc/nginx/snippets/sokar-proxy.conf;
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
        proxy_hide_header Cache-Control;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' https: data:; font-src 'self' data:; connect-src 'self'; frame-ancestors *; base-uri 'self'; form-action 'self'" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
        proxy_read_timeout 30s;
    }

    location ^~ /_next/static/ {
        proxy_pass http://sokar_dashboard;
        include /etc/nginx/snippets/sokar-proxy.conf;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location / {
        proxy_pass http://sokar_dashboard;
        include /etc/nginx/snippets/sokar-proxy.conf;
        add_header X-Frame-Options "SAMEORIGIN" always;
    }
}

server {
    listen 80;
    listen [::]:80;
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.sokar.tech;

    ssl_certificate /etc/letsencrypt/live/sokar.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sokar.tech/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Rate limit nginx sur les routes Connect sensibles (protection avant Fastify).
    # /hold et /confirm écrivent en DB + Redis — protection renforcée.
    location ~ ^/public/r/[^/]+/hold$ {
        proxy_pass http://sokar_api;
        include /etc/nginx/snippets/sokar-proxy.conf;
        limit_req zone=connect_hold burst=5 nodelay;
    }

    location ~ ^/public/r/[^/]+/confirm$ {
        proxy_pass http://sokar_api;
        include /etc/nginx/snippets/sokar-proxy.conf;
        limit_req zone=connect_confirm burst=3 nodelay;
    }

    # Rate limit global sur les routes publiques Connect (availability, slug, cities, etc.)
    location ^~ /public/ {
        proxy_pass http://sokar_api;
        include /etc/nginx/snippets/sokar-proxy.conf;
        limit_req zone=connect_public burst=20 nodelay;
    }

    location / {
        proxy_pass http://sokar_api;
        include /etc/nginx/snippets/sokar-proxy.conf;

        # Telnyx media streams are long-lived WebSocket connections.
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
